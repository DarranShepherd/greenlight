name: Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  firmware-build:
    name: Firmware Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0
    strategy:
      fail-fast: false
      matrix:
        board:
          - cyd_28_2432s028r
          - ipistbit_32_st7789
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install asset generation dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install --yes nodejs npm python3-cairosvg python3-pil
          npm install --global lv_font_conv

      - name: Verify generated assets are up to date
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          sh tools/validate.sh firmware ${{ matrix.board }}

  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libcjson-dev

      - name: Run host-side logic tests
        run: sh tools/validate.sh host