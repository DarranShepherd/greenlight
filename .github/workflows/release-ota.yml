name: OTA Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build And Publish OTA Artifacts
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install asset generation dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install --yes nodejs npm python3-cairosvg python3-pil
          npm install --global lv_font_conv

      - name: Build firmware from tag
        shell: bash
        run: |
          set -eu
          . /opt/esp/idf/export.sh
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          PROJECT_VER="${VERSION}" sh tools/validate.sh firmware cyd_28_2432s028r
          cp build-cyd_28_2432s028r/greenlight.bin dist/firmware-cyd28.bin

          PROJECT_VER="${VERSION}" sh tools/validate.sh firmware ipistbit_32_st7789
          cp build-ipistbit_32_st7789/greenlight.bin dist/firmware-ipistbit32.bin

      - name: Generate OTA metadata
        shell: bash
        run: |
          set -eu
          . /opt/esp/idf/export.sh
          VERSION="${GITHUB_REF_NAME#v}"
          python3 tools/generate_release_metadata.py \
            --version "${VERSION}" \
            --tag "${GITHUB_REF_NAME}" \
            --repository "${GITHUB_REPOSITORY}" \
            --variant cyd_28_2432s028r=dist/firmware-cyd28.bin \
            --variant ipistbit_32_st7789=dist/firmware-ipistbit32.bin \
            --output dist/metadata.json

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/firmware-cyd28.bin
            dist/firmware-ipistbit32.bin
            dist/metadata.json
          overwrite_files: true