name: Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  firmware-build:
    name: Firmware Build
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install asset generation dependencies
        shell: bash
        run: |
          apt-get update
          apt-get install --yes nodejs npm python3-cairosvg python3-pil
          npm install --global lv_font_conv

      - name: Regenerate generated assets
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          git config --global --add safe.directory "$PWD"
          idf.py reconfigure
          python3 tools/generate_assets.py

      - name: Verify generated assets are up to date
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          sh tools/validate.sh firmware

  host-tests:
    name: Host Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential libcjson-dev

      - name: Run host-side logic tests
        run: sh tools/validate.sh host